name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path Cargo.toml -Pattern '^\s*version\s*=\s*"(.+)"\s*$' | Select-Object -First 1
          if (-not $match) {
            throw "Could not read package version from Cargo.toml"
          }
          $version = $match.Matches.Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Skip if tag already exists
        id: tag
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}"^{commit} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists; skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release binary
        if: steps.tag.outputs.exists == 'false'
        run: cargo build --release

      - name: Ensure Inno Setup
        id: innosetup
        if: steps.tag.outputs.exists == 'false'
        shell: pwsh
        run: |
          function Find-Iscc {
            $fromPath = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($fromPath) { return $fromPath.Source }
            foreach ($path in @(
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            )) {
              if (Test-Path $path) { return $path }
            }
            return $null
          }

          $iscc = Find-Iscc
          if (-not $iscc) {
            Write-Host "ISCC.exe not found in PATH or default locations; installing via Chocolatey..."
            choco install innosetup -y --no-progress
            $iscc = Find-Iscc
          } else {
            Write-Host "Inno Setup already available: $iscc"
          }
          if (-not $iscc) {
            throw "Inno Setup compiler (ISCC.exe) not found after install attempt"
          }
          "iscc=$iscc" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build installer
        if: steps.tag.outputs.exists == 'false'
        shell: pwsh
        run: |
          & "${{ steps.innosetup.outputs.iscc }}" "/DMyAppVersion=${{ steps.version.outputs.version }}" installer\bgwm.iss

      - name: Publish GitHub release
        if: steps.tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BGWM ${{ steps.version.outputs.tag }}
          files: dist/bgwm-setup-${{ steps.version.outputs.version }}.exe
          generate_release_notes: true
